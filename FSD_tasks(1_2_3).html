<!DOCTYPE html>
<html>
<head>
    <title>Basic HTML Page</title>
</head>
<body>

    <h1>Welcome to My Web Page</h1>

    <p>This is a basic HTML page containing a heading and a paragraph.</p>

<!DOCTYPE html>
<html>
<head>
    <title>Image and Hyperlink</title>
</head>
<body>

    <h1>My Web Page</h1>

    <!-- Image -->
    <img src="https://via.placeholder.com/300" alt="Sample Image" width="300">

    <br><br>

    <!-- Hyperlink -->
    <a href="https://www.google.com" target="_blank">Visit Google</a>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Ordered and Unordered List</title>
</head>
<body>

    <h2>Ordered List</h2>
    <ol>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ol>

    <h2>Unordered List</h2>
    <ul>
        <li>Apple</li>
        <li>Banana</li>
        <li>Orange</li>
    </ul>

</body>
</html>
